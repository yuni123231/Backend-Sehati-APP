<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

</head>
<body class="login-page">

<h1 class="login-title">Health Lifestyle</h1>

<div class="login-card">

        <button>Sign In</button>
    </form>
</div>

</body>
</html>
